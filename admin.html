<!doctype html><html><head><meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Private Admin · LaunchBoard</title><link rel="stylesheet" href="styles.css?v=8.1.3"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js?v=8.1.3"></script><script defer src="common.js?v=8.1.3"></script><script defer src="admin.js?v=8.1.3"></script>  <meta name="launchboard-build" content="8.1.3">
</head><body><header class="topbar"><div class="container nav"><a class="brand" href="index.html">Launch<span>Board</span></a><span class="eyebrow">Private administration</span><div class="actions" id="navActions"></div></div></header><main class="page"><div class="container" id="gate"><h1>Admin sign-in</h1><p class="muted">This page is not linked from the public website.</p><button class="btn btn-primary" onclick="document.querySelector('#loginModal').showModal()">Log in</button></div><div id="adminApp" hidden><div class="section-head"><div><h1>Administration</h1><p class="muted">Moderation, verification and premium placement.</p></div></div><div class="dashboard-grid" id="adminStats"></div><section class="section"><div class="two-col"><div class="card pad"><h2>Users</h2><input class="field" id="userSearch" placeholder="Search users"><div id="users"></div></div><div class="card pad"><h2>Products</h2><input class="field" id="productSearch" placeholder="Search products"><div id="products"></div></div></div></section></div></main><dialog class="modal" id="loginModal"><div class="pad"><h2>Admin login</h2><form id="loginForm" class="form-grid"><input class="field full" name="email" type="email" required placeholder="Email"><input class="field full" name="password" type="password" required placeholder="Password"><button class="btn btn-primary full">Log in</button></form></div></dialog><div class="toast" id="toast"></div>
<dialog class="modal" id="reportModal">
  <div class="pad">
    <div class="row between"><h2>Report content</h2><button class="btn btn-ghost" type="button" data-close-dialog>Close</button></div>
    <form id="reportForm" class="form-grid">
      <input type="hidden" name="target_type" id="reportTargetType">
      <input type="hidden" name="target_id" id="reportTargetId">
      <select class="field full" name="reason" required>
        <option value="">Choose a reason</option>
        <option value="spam">Spam or misleading</option>
        <option value="scam">Possible scam or fraud</option>
        <option value="prohibited">Prohibited product</option>
        <option value="copyright">Copyright or impersonation</option>
        <option value="abuse">Harassment or abuse</option>
        <option value="other">Other</option>
      </select>
      <textarea class="field full" name="details" maxlength="800" placeholder="Briefly explain the problem" required></textarea>
      <button class="btn btn-primary full" type="submit">Submit report</button>
    </form>
  </div>
</dialog>

<dialog class="modal" id="forgotPasswordModal">
  <div class="pad">
    <div class="row between"><h2>Reset password</h2><button class="btn btn-ghost" type="button" data-close-dialog>Close</button></div>
    <form id="forgotPasswordForm" class="form-grid">
      <input class="field full" name="email" type="email" placeholder="Email address" required>
      <button class="btn btn-primary full" type="submit">Send reset email</button>
    </form>
  </div>
</dialog>

<dialog class="modal" id="newPasswordModal">
  <div class="pad">
    <h2>Choose a new password</h2>
    <form id="newPasswordForm" class="form-grid">
      <input class="field full" name="password" type="password" minlength="8" placeholder="New password" required>
      <button class="btn btn-primary full" type="submit">Update password</button>
    </form>
  </div>
</dialog>
</body></html>
