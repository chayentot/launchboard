<!doctype html>
<html lang="en">
<head><link rel="manifest" href="manifest.webmanifest?v=10.0.0"><meta name="theme-color" content="#6c4cf6"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password · LaunchBoard</title>
  <link rel="stylesheet" href="styles.css?v=10.0.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="config.js?v=10.0.0"></script>
  <script defer src="common.js?v=10.0.0"></script>
  <meta name="launchboard-build" content="10.0.0">
</head>
<body>
  <header class="site-header"><div class="container nav"><a class="brand" href="index.html">Launch<span>Board</span></a></div></header>
  <main class="container section narrow">
    <div class="card pad">
      <span class="eyebrow">Account recovery</span>
      <h1>Set a new password</h1>
      <p>Use at least eight characters.</p>
      <form id="newPasswordForm" class="form-grid">
        <input class="field full" name="password" type="password" minlength="8" placeholder="New password" required>
        <button class="btn btn-primary full" type="submit">Update password</button>
      </form>
    </div>
  </main>
  <div class="toast" id="toast"></div>
<script defer src="production.js?v=10.0.0"></script></body>
</html>
