<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Creator Dashboard · LaunchBoard</title><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script defer src="common.js"></script><script defer src="dashboard.js"></script></head><body><header class="topbar"><div class="container nav"><a class="brand" href="index.html">Launch<span>Board</span></a><nav class="navlinks"><a href="index.html">Marketplace</a><a href="messages.html">Messages</a></nav><div class="actions" id="navActions"></div></div></header><main class="page"><div class="container"><div class="section-head"><div><span class="eyebrow">Creator workspace</span><h1>Your dashboard</h1></div><button class="btn btn-primary" id="openSubmit">+ Add product</button></div><div class="dashboard-grid" id="analytics"></div><section class="section"><div class="two-col"><div class="card pad"><h2>Your products</h2><div id="myProducts"></div></div><div><div class="card pad"><h2>Edit creator profile</h2><form id="profileForm" class="form-grid"><input class="field full" name="full_name" placeholder="Display name"><input class="field full" name="username" placeholder="Username"><textarea class="field full" name="bio" placeholder="Bio"></textarea><input class="field full" name="avatar_url" placeholder="Avatar image URL"><input class="field full" name="website_url" placeholder="Website URL"><input class="field full" name="location" placeholder="Location"><button class="btn btn-primary full">Save profile</button></form></div><div class="card pad" style="margin-top:20px"><h2>Notifications</h2><div id="notifications" class="notice-list"></div></div></div></div></section></div></main>
<dialog class="modal" id="productModal"><div class="pad"><div class="row between"><h2 id="productModalTitle">Publish a product</h2><button class="btn btn-ghost" type="button" id="closeProductModal">Close</button></div><form id="productForm" class="form-grid"><input type="hidden" name="product_id" id="editingProductId"><input class="field full" name="title" placeholder="Product title" required><input class="field" name="creator" placeholder="Creator or brand" required><input class="field" name="price" placeholder="Price or View price"><select class="field" name="category" id="productCategory" required></select><select class="field" name="product_type"><option>Physical</option><option>Digital</option><option>Service</option></select><input class="field" name="brand" placeholder="Brand"><input class="field" name="country" placeholder="Country"><label class="field full upload-field"><span>Product image</span><input name="image_file" id="productImageFile" type="file" accept="image/jpeg,image/png,image/webp,image/gif"><small>Upload JPG, PNG, WebP, or GIF (maximum 5 MB).</small></label><input class="field full" name="image_url" type="url" placeholder="Optional direct image URL instead"><div class="full image-preview-wrap" id="productImagePreviewWrap" hidden><img id="productImagePreview" class="image-preview" alt="Selected product image preview"></div><p class="full muted" id="productUploadStatus"></p><input class="field full" name="product_url" type="url" placeholder="https://your-store.com/product" required><textarea class="field full" name="description" minlength="10" maxlength="180" placeholder="Description" required></textarea><input class="field full" name="tags" placeholder="tags, separated, by commas"><div class="full row product-form-actions"><button class="btn btn-primary" id="saveProductButton" type="submit">Publish immediately</button><button class="btn btn-ghost" id="cancelProductEdit" type="button" hidden>Cancel editing</button></div></form></div></dialog><div class="toast" id="toast"></div></body></html>
