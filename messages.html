<!doctype html><html><head><meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Messages · LaunchBoard</title><link rel="stylesheet" href="styles.css?v=8.1.8"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js?v=8.1.8"></script><script defer src="common.js?v=8.1.8"></script><script defer src="messages.js?v=8.1.8"></script>  <meta name="launchboard-build" content="8.1.8">
</head><body><header class="topbar"><div class="container nav"><a class="brand" href="index.html">Launch<span>Board</span></a><nav class="navlinks"><a href="dashboard.html">Dashboard</a></nav><div class="actions" id="navActions"></div></div></header><main class="page messenger-page">
  <div class="container messenger-container">
    <section class="messenger-mobile-shell">
      <header class="messenger-mobile-top">
        <div>
          <span class="messenger-brand">messages</span>
        </div>
        <button class="messenger-compose-icon" id="openCreatorSearch" type="button" aria-label="Start new message">✎</button>
      </header>

      <label class="messenger-mobile-search">
        <span aria-hidden="true">⌕</span>
        <input id="conversationSearch" type="search" placeholder="Search messages">
      </label>

      <section class="messenger-following-strip">
        <div class="messenger-following-head">
          <strong>Following</strong>
          <button id="openCreatorSearchSecondary" type="button">See all</button>
        </div>
        <div class="messenger-following-list" id="followingCreatorStrip"></div>
      </section>

      <section class="messenger-inbox-section" aria-label="Conversations">
        <div id="conversationList" class="messenger-conversation-list"></div>
      </section>

      <section class="messenger-chat-pane" id="messengerChatPane">
        <header class="messenger-chat-header" id="chatTitle">
          <button class="messenger-chat-back" id="closeChatView" type="button" aria-label="Back to messages">‹</button>
          <div>
            <h2>Select a conversation</h2>
            <p>Choose someone from your messages.</p>
          </div>
        </header>

        <div class="messenger-messages" id="messages"></div>

        <form class="messenger-composer" id="messageForm">
          <button class="messenger-attach-button" id="openAttachmentMenu" type="button" aria-label="Attach a file">＋</button>
          <input id="messageAttachmentInput" type="file" hidden accept="image/jpeg,image/png,image/webp,application/pdf,.doc,.docx,.xls,.xlsx,.txt">
          <input class="field" name="body" placeholder="Type a message..." autocomplete="off">
          <button class="messenger-send-button" type="submit">Send</button>
        </form>
      </section>
    </section>
  </div>
</main>
<dialog class="modal creator-message-modal" id="creatorMessageModal" aria-labelledby="creatorMessageTitle">
  <div class="pad">
    <div class="row between">
      <div>
        <span class="eyebrow">New message</span>
        <h2 id="creatorMessageTitle">Find a creator</h2>
      </div>
      <button class="btn btn-ghost" id="closeCreatorSearch" type="button">Close</button>
    </div>

    <input class="field full" id="creatorSearchInput" type="search" placeholder="Search creator name">

    <div class="creator-message-tabs" role="tablist">
      <button class="active" id="followingCreatorsTab" type="button">Following</button>
      <button id="allCreatorsTab" type="button">All creators</button>
    </div>

    <div class="creator-message-results" id="creatorMessageResults"></div>
  </div>
</dialog>

<dialog class="modal messenger-attachment-modal" id="messageAttachmentModal" aria-labelledby="messageAttachmentTitle">
  <div class="pad">
    <div class="row between">
      <div><span class="eyebrow">Attachment</span><h2 id="messageAttachmentTitle">Add to message</h2></div>
      <button class="btn btn-ghost" id="closeAttachmentMenu" type="button">Close</button>
    </div>
    <div class="messenger-attachment-options">
      <button type="button" data-attachment-accept="image/jpeg,image/png,image/webp">
        <span>🖼️</span><strong>Photo</strong><small>JPG, PNG or WEBP</small>
      </button>
      <button type="button" data-attachment-accept="application/pdf,.doc,.docx,.xls,.xlsx,.txt">
        <span>📄</span><strong>Document</strong><small>PDF, Word, Excel or TXT</small>
      </button>
    </div>
    <div class="messenger-attachment-preview" id="messageAttachmentPreview" hidden></div>
  </div>
</dialog>

<div class="toast" id="toast"></div>
<dialog class="modal" id="reportModal">
  <div class="pad">
    <div class="row between"><h2>Report content</h2><button class="btn btn-ghost" type="button" data-close-dialog>Close</button></div>
    <form id="reportForm" class="form-grid">
      <input type="hidden" name="target_type" id="reportTargetType">
      <input type="hidden" name="target_id" id="reportTargetId">
      <select class="field full" name="reason" required>
        <option value="">Choose a reason</option>
        <option value="spam">Spam or misleading</option>
        <option value="scam">Possible scam or fraud</option>
        <option value="prohibited">Prohibited product</option>
        <option value="copyright">Copyright or impersonation</option>
        <option value="abuse">Harassment or abuse</option>
        <option value="other">Other</option>
      </select>
      <textarea class="field full" name="details" maxlength="800" placeholder="Briefly explain the problem" required></textarea>
      <button class="btn btn-primary full" type="submit">Submit report</button>
    </form>
  </div>
</dialog>

<dialog class="modal" id="forgotPasswordModal">
  <div class="pad">
    <div class="row between"><h2>Reset password</h2><button class="btn btn-ghost" type="button" data-close-dialog>Close</button></div>
    <form id="forgotPasswordForm" class="form-grid">
      <input class="field full" name="email" type="email" placeholder="Email address" required>
      <button class="btn btn-primary full" type="submit">Send reset email</button>
    </form>
  </div>
</dialog>

<dialog class="modal" id="newPasswordModal">
  <div class="pad">
    <h2>Choose a new password</h2>
    <form id="newPasswordForm" class="form-grid">
      <input class="field full" name="password" type="password" minlength="8" placeholder="New password" required>
      <button class="btn btn-primary full" type="submit">Update password</button>
    </form>
  </div>
</dialog>
</body></html>
